name: Build & Release Desktop Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build & Release Windows MSI
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build MSI Installer
        run: ./gradlew :composeApp:packageMsi

      - name: Upload Windows MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi

      - name: Release Windows MSI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build & Release macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build DMG Installer
        run: ./gradlew :composeApp:packageDmg

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-macOS-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

      - name: Release macOS DMG
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/dmg/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Desktop Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      msi_name: ${{ steps.find_msi.outputs.msi_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build MSI Installer
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :composeApp:packageMsi

      - name: Find MSI file name
        id: find_msi
        shell: bash
        run: |
          MSI_FILE=$(ls composeApp/build/compose/binaries/main/msi/*.msi | head -1)
          echo "msi_name=$(basename $MSI_FILE)" >> $GITHUB_OUTPUT

      - name: Upload Windows MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi

      - name: Release Windows MSI
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/msi/*.msi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      dmg_name: ${{ steps.find_dmg.outputs.dmg_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build DMG Installer
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew :composeApp:packageDmg

      - name: Find DMG file name
        id: find_dmg
        run: |
          DMG_FILE=$(ls composeApp/build/compose/binaries/main/dmg/*.dmg | head -1)
          echo "dmg_name=$(basename $DMG_FILE)" >> $GITHUB_OUTPUT

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-macOS-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

      - name: Release macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          files: composeApp/build/compose/binaries/main/dmg/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-version-json:
    name: Update version.json
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "msi_name=${{ needs.build-windows.outputs.msi_name }}" >> $GITHUB_OUTPUT
          echo "dmg_name=${{ needs.build-macos.outputs.dmg_name }}" >> $GITHUB_OUTPUT

      - name: Write version.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MSI_NAME="${{ needs.build-windows.outputs.msi_name }}"
          DMG_NAME="${{ needs.build-macos.outputs.dmg_name }}"
          REPO="khalidabdou/Associations"

          cat > version.json << EOF
          {
            "latestVersion": "$VERSION",
            "changelog": "- تحديثات الإصدار $VERSION\n- إصلاحات وتحسينات عامة",
            "windowsDownloadUrl": "https://github.com/$REPO/releases/download/v$VERSION/$MSI_NAME",
            "macDownloadUrl": "https://github.com/$REPO/releases/download/v$VERSION/$DMG_NAME"
          }
          EOF

      - name: Commit and push version.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "chore: update version.json to ${{ steps.version.outputs.version }} [skip ci]" || echo "Nothing to commit"
          # Pull with rebase to handle concurrent commits (e.g. manual version bumps)
          git pull origin main --rebase --autostash || true
          git push origin HEAD:main || {
            echo "Regular push failed (conflict). Trying force-with-lease for version.json only..."
            # version.json is a CI-controlled manifest; force-with-lease is safe here
            git push origin HEAD:main --force-with-lease
          }

name: Build & Release Desktop Apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build MSI Installer
        run: ./gradlew :composeApp:packageMsi

      - name: Upload Windows MSI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-Windows-MSI
          path: composeApp/build/compose/binaries/main/msi/*.msi

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build DMG Installer
        run: ./gradlew :composeApp:packageDmg

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Associations-macOS-DMG
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  publish-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          name: Associations-Windows-MSI
          path: release-artifacts

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: Associations-macOS-DMG
          path: release-artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
